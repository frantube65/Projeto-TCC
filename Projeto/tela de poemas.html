<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Poema</title>
    <link rel="stylesheet" href="CSS/tela de poemas.css">
</head>
<body>

    <header>
        <h1>📚 Poemas</h1>
    </header>


    <main class="grid" id="conteudo-dinamico">
        <!-- O JavaScript preencherá os IDs abaixo -->
        <article class="card info">
            <p id="descricao-poema"></p> 
            <cite class="autor" id="autor-poema"></cite> 
        </article>

        <article class="card poema">
            <h2 id="titulo-poema"></h2>
            <div id="texto-poema"></div>
        </article>
    </main>

    <nav class="nav-links">
        <a href="biblioteca de poemas.html" class="btn-voltar">Voltar para Biblioteca</a>
    </nav>
    

    <script>
        // 1. Banco de dados com as informações de cada poema
        const biblioteca = {
    
    "drummond": {
        titulo: "No Meio do Caminho",
        autor: "Carlos Drummond de Andrade",
        descricao: "Um marco do Modernismo brasileiro.",
        texto: "No meio do caminho tinha uma pedra <br>Tinha uma pedra no meio do caminho<br>Tinha uma pedra No meio do caminho tinha uma pedra<br>Nunca me esquecerei desse acontecimento Na vida de minhas retinas tão fatigadas<br>Nunca me esquecerei que no meio do caminho<br>Tinha uma pedra Tinha uma pedra no meio do caminho<br>No meio do caminho tinha uma pedra"
    },
    "motivo": {
        titulo: "Motivo",
        autor: "Cecília Meireles",
        descricao: "Sobre a efemeridade e a missão do poeta.",
        texto: "Eu canto porque o instante existee a minha vida está completa.<br>Não sou alegre nem sou triste:sou poeta.<br>Irmão das coisas fugidias,não sinto gozo nem tormento.<br>Atravesso noites e diasno vento."
    },
    "reflexo": {
        titulo: "Reflexo",
        autor: "Pablo Neruda",
        descricao: "Um olhar sobre o amor e a reciprocidade.",
        texto: "Amor é feito espelho:<br>Tem que ter reflexo..."
    },
    "poeta": {
        titulo: "Poeta",
        autor: "Cecília Meireles",
        descricao: "A celebração do instante através do canto.",
        texto: "Eu canto porque o instante existe<br>e a minha vida está completa."
    },
    "mudanca": {
        titulo: "Mudam-se os Tempos",
        autor: "Luís de Camões",
        descricao: "Um clássico sobre a impermanência de tudo.",
        texto: "Mudam-se os tempos, mudam-se as vontades,<br>Muda-se o ser, muda-se a confiança."
    },

    "travessia": {
        titulo: "Travessia",
        autor: "Fernando Pessoa",
        descricao: "Trecho da obra 'Mensagem', um dos poemas mais famosos sobre a superação e o mar.",
        texto: "Valeu a pena? Tudo vale a pena<br>Se a alma não é pequena.<br>Quem quer passar além do Bojador<br>Tem que passar além da dor."
    },
    "obvio": {
        titulo: "O Óbvio",
        autor: "Paulo Leminski",
        descricao: "Uma reflexão curta e poderosa sobre a percepção do cotidiano.",
        texto: "o óbvio / é o que nunca se vê / ao menos que<br>você / ande / muito / distraído..."
    },
    "vida": {
        titulo: "A Vida",
        autor: "Cora Coralina",
        descricao: "A poetisa de Goiás nos ensina sobre a paciência e o processo de colheita da vida.",
        texto: "O que vale na vida não é o ponto de partida<br>e sim a caminhada.<br>Caminhando e semeando,<br>no fim terás o que colher."
    },
    "renova": {
        titulo: "Renova-te",
        autor: "Cecília Meireles",
        descricao: "Um convite à introspecção e ao renascimento pessoal constante.",
        texto: "Renova-te.<br>Renasce em ti mesmo.<br>Multiplica os teus olhos, a tua atenção.<br>Põe-te à prova."
    },
    "corrida": {
        titulo: "Corrida",
        autor: "Carlos Drummond de Andrade",
        descricao: "Uma lição sobre empatia e sobre aproveitar a jornada, não apenas o destino.",
        texto: "A vida é uma corrida que não se corre sozinho,<br>e vencer não é chegar,<br>é saber viver o caminho,<br>com o que a vida tem para dar."
    }
};

        
        // 2. Lógica para ler qual poema foi clicado
        const parametros = new URLSearchParams(window.location.search);
        const idPoema = parametros.get('p');
        const dados = biblioteca[idPoema];

        // 3. Se o ID existir na biblioteca, preenche a página
        if (dados) {
            document.getElementById('descricao-poema').innerText = dados.descricao;
            document.getElementById('autor-poema').innerText = dados.autor;
            document.getElementById('titulo-poema').innerText = dados.titulo;
            document.getElementById('texto-poema').innerHTML = `<p>${dados.texto}</p>`;
        } else {
            // Se abrir a página sem clicar em "Entrar", mostra o aviso
            document.getElementById('conteudo-dinamico').innerHTML = `
                <div class="card" style="grid-column: 1/-1; text-align: center; width: 100%;">
                    <h2>Poema não selecionado</h2>
                    <p>Por favor, volte à biblioteca e selecione um poema.</p>
                </div>`;
        }
    </script>
   
</body>
<section class="sugestoes">
    <h3>Explorar mais</h3>
    <div class="sugestoes-grid">
        <div class="mini-card">
            <h4>Poesia Moderna</h4>
            <p>Conheça mais sobre o movimento de 1922.</p>
        </div>
        <div class="mini-card">
            <h4>Análise</h4>
            <p>Por que Drummond usou a repetição?</p>
        </div>
        <div class="mini-card">
            <h4>Citações</h4>
            <p>Frases icônicas deste autor.</p>
        </div>
    </div>
</section>
</html>
